<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Novi Prime Athletics - Sistem Manajemen Anggota Gym">
    <title>Login - Gym Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <!-- Left Side - Image -->
        <div class="login-image-side">
            <img src="./assets/images/banner2.png" alt="Gym Interior">
            <div class="login-image-overlay">
                <div class="login-image-content">

                    <h2>Novi Prime Athletics</h2>
                    <p>Kelola membership gym Anda dengan mudah, cepat, dan profesional.</p>
                    <div class="login-image-stats">
                        <div class="img-stat">
                            <span class="img-stat-value">248+</span>
                            <span class="img-stat-label">Member Aktif</span>
                        </div>
                        <div class="img-stat">
                            <span class="img-stat-value">5</span>
                            <span class="img-stat-label">Trainer Pro</span>
                        </div>
                        <div class="img-stat">
                            <span class="img-stat-value">3</span>
                            <span class="img-stat-label">Paket</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-side">
            <div class="login-card">
                <div class="login-logo">
                    <div class="logo-icon">
                        <img src="./assets/images/logo_gym.png" alt="Logo Novi Prime" class="logo-img">
                    </div>
                        <h1>Selamat Datang!</h1>
                        <p>Masuk ke dashboard manajemen gym Anda</p>
                    </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label" for="loginUsername">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="loginUsername" placeholder="Masukkan username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="loginPassword">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="loginPassword" placeholder="Masukkan password" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Ingat saya</label>
                        </div>
                        <a href="#" class="forgot-link" onclick="alert('Fitur reset password akan tersedia setelah integrasi backend.')">Lupa password?</a>
                    </div>
                    <button type="submit" class="btn btn-login" id="btnLogin">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
                    </button>
                </form>
                <div class="login-demo-info">
                    <p>Demo Credentials</p>
                    <code>admin / admin123</code>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
